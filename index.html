<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>intercambio de regalos</title>

    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="bg-dark text-white text-center p-3">
        <h2>Intercambio de regalos</h2>
    </header>

    <!-- contenedor-->
    <div class="container mt-4">
        <!-- pantalla de inicio -->
        <section id="inicio" class="pantalla">
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6 text-center">
                    
                    <img src="assets/logo.png" width="120">
                    <h3 class="mt-3">organiza tu intercambio facilmente</h3>

                    <button class="btn btn-primary mt-3" onclick="mostrarPantalla('configuracion')">crear evento</button>
                </div>
            </div>
        </section>


        <!-- pantalla de configuracion -->
        <section id="configuracion" class="pantalla d-none">
            <div class="row">
                <div class="col-12 col-md-6">
                    
                    <h4>configuracion del evento</h4>

                    <label class="form-label">organizador</label>
                    <input class="form-control" placeholder="nombre">

                    <label class="form-label mt-3">tipo de evento</label>

                    <select class="form-control">
                        <option>navidad</option>
                        <option>cumpleanos</option>
                        <option>amigos</option>
                    </select>

                    <button class="btn btn-success mt-3" onclick="mostrarPantalla('participantes')">siguiente</button>
                </div>
            </div>
        </section>

        <!-- pantalla de los participantes -->
        <section id="participantes" class="pantalla d-none">
            <h4>participantes</h4>

            <div class="row">

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-3 mb-3">participante 1</div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-3 mb-3">participante 2</div>
                </div>

                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card p-3 mb-3">participante 3</div>
                </div>

            </div>

            <button class="btn btn-primary" onclick="mostrarPantalla('exclusiones')">siguiente</button>
        </section>

        <!-- pantalla de las exclusiones -->
        <section id="exclusiones" class="pantalla d-none">
            <h4>exclusiones</h4>

            <p>aqui ira el drag & drop</p>

            <button class="btn btn-primary" onclick="mostrarPantalla('resumen')">siguiente</button>
        </section>

        <!-- pantalla del resumen -->
        <section id="resumen" class="pantalla d-none">

            <h4>datos del evento</h4>

            <p>organizador:</p>
            <p>fecha:</p>
            <p>presupuesto:</p>

            <button class="btn btn-success" onclick="mostrarPantalla('sorteo')">ir al sorteo</button>

        </section>

        <!-- pantalla del sroteo -->
        <section id="sorteo" class="pantalla d-none">
            <h4>sorteo</h4>

            <button class="btn btn-danger">realizar sorteo</button>

        </section>

    </div>


    <script src="js/app.js"></script>

</body>
</html>
